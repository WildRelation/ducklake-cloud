services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ducklake
      POSTGRES_USER: duck
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duck -d ducklake"]
      interval: 10s
      retries: 5
    ports:
      - "5432:5432"

  minio:
    image: quay.io/minio/minio:latest
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ducklake
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "9000:9000"
      - "9001:9001"

  mc:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c "
      mc alias set local http://minio:9000 ducklake minioadmin;
      mc mb local/ducklake;
      exit 0;
      "
    restart: on-failure

volumes:
  postgres_data:
  minio_data:
